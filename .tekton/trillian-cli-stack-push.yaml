apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/securesign/trillian?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "push" && target_branch == "release-1.4"
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: cli-stacks-v1-4
    appstudio.openshift.io/component: trillian-cli-stack-v1-4
    pipelines.appstudio.openshift.io/type: build
  name: trillian-cli-stack-v1-4-on-push
  namespace: rhtas-tenant
spec:
  params:
  - name: release-version
    value: "1.4.2"
  - name: dockerfile
    value: Dockerfile.cli-stack.rh
  - name: git-url
    value: '{{source_url}}'
  - name: output-image
    value: quay.io/securesign/trillian-cli-stack:{{revision}}
  - name: path-context
    value: .
  - name: revision
    value: '{{revision}}'
  - name: prefetch-input
    value: '{"type": "gomod", "path": "."}'
  - name: hermetic
    value: "false"
  - name: build-source-image
    value: "true"
  - name: ALLOW_CROSS_PLATFORM_IMAGES
    value: "true"
  pipelineRef:
    params:
    - name: url
      value: https://github.com/securesign/pipelines.git
    - name: revision
      value: main
    - name: pathInRepo
      value: pipelines/docker-build-oci-ta.yaml
    resolver: git
  taskRunTemplate:
    serviceAccountName: build-pipeline-trillian-cli-stack-v1-4
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
